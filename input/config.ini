# gotcha: an inline "#" comment MUST be preceded by a space, or it's parsed as
# part of the value (e.g. "3500000#comment" silently fails to parse as an
# integer and falls back to no limit at all).

[generalsettings]
# available levels, from most to least verbose: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = DEBUG # level of logging in the console
log_interval = 50000 # loop iterations between DEBUG progress log messages
max_nodes_observed = 8000000 # how many are to be observed at most
max_fringe_size = 3500000 # how many are to be stored in the fringe at most

[problem]
# define the problem which should be solved.
state = input/state_40.csv # path to the puzzle CSV to load; see input/ for the available boards

[searchagents]
# label = heuristic, a, b, track_visited
# heuristic: hamming, manhattan, or zero (leave blank to use SearchAgent's default).
# a/b weight the evaluation function as f(n) = a*g(n) + b*h(n).
# a=1,b=0 behaves like Dijkstra; a=0,b=1 like Greedy; a=1,b=1 like plain A*.
# track_visited: true = graph search, false = tree search

#Example
#Dijkstra ( ,g1, h0, T) =,1,0, true
#Greedy (Manhattan,g0,h1, T) = manhattan, 0, 1, true

